{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4">Automation Showcase</h1>
    <div class="list-group">
        {% for script in scripts %}
        <a href="{% url 'scripts:run_script' script.id %}" class="list-group-item list-group-item-action">
            <h5 class="mb-1">{{ script.name }}</h5>
            <p class="mb-1">{{ script.description }}</p>
        </a>
        {% empty %}
        <div class="list-group-item">
            <p class="mb-1 text-muted">No scripts found for this category.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

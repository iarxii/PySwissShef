{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PySwissShef Laboratory</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 Core -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Lab Custom Theme -->
    <link rel="stylesheet" href="{% static 'css/lab_theme.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-bistro sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'scripts:home' %}">
                <img src="{% static 'images/pyswisschef_ai_logo.png' %}" alt="Logo" width="40" height="40" class="d-inline-block align-text-top rounded-circle shadow-sm">
                <span class="ms-3 text-gold">PySwissShef <span class="fw-light small">LAB</span></span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'showcase' %}active{% endif %}" href="{% url 'scripts:showcase' %}">SHOWCASE</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'profile' %}active{% endif %}" href="{% url 'scripts:profile' %}">CHEF'S PROFILE</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}" href="{% url 'scripts:contact' %}">GET IN TOUCH</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="container py-4 mt-5 text-center text-muted border-top border-secondary">
        <p class="small text-mono text-gold">&copy; 2026 PySwissShef Laboratory | Precise Python & High-Heat Automation</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-lg-8">
        <div class="glass-panel p-5">
            <h1 class="display-4 text-gold mb-4 text-center">Get in <span class="text-white">Touch</span></h1>
            <p class="text-center text-muted mb-5">Have a complex automation project? Let's discuss the ingredients.</p>
            
            <form class="row g-4">
                <div class="col-md-6">
                    <label class="form-label small text-gold text-mono">NAME</label>
                    <input type="text" class="form-control bg-dark border-secondary text-white p-3" placeholder="Enter name...">
                </div>
                <div class="col-md-6">
                    <label class="form-label small text-gold text-mono">EMAIL</label>
                    <input type="email" class="form-control bg-dark border-secondary text-white p-3" placeholder="Enter email...">
                </div>
                <div class="col-12">
                    <label class="form-label small text-gold text-mono">MESSAGE</label>
                    <textarea class="form-control bg-dark border-secondary text-white p-3" rows="5" placeholder="Tell us about the project..."></textarea>
                </div>
                <div class="col-12 mt-5">
                    <button type="button" class="btn btn-gourmet w-100 p-3">Submit Recipe Request</button>
                    <p class="small text-center text-muted mt-3">Ready to server high-performance code.</p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

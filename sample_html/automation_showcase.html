
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Showcase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4">Automation Showcase</h1>
        <div class="list-group">
            {% for script in scripts %}
            <a href="{% url 'run_script' script.id %}" class="list-group-item list-group-item-action">
                <h5 class="mb-1">{{ script.name }}</h5>
                <p class="mb-1">{{ script.description }}</p>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
